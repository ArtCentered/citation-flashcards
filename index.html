                    {card.argues && (<div>
                        <button onClick={e=>{e.stopPropagation();setShowMore(v=>!v);}} className={`flex items-center gap-1 text-xs font-medium mb-2 btn-bounce ${dm?'text-teal-400 hover:text-teal-300':'text-[#2E4057] hover:text-[#3a5270]'}`}>
                            {showMore?'Show Less':'Show Full Study Guide'} <ChevDown open={showMore} dm={dm}/>
                        </button>
                        <div className={`show-more-content ${showMore?'expanded':''}`}>
                            {[['Argues',card.argues],['Connects to Your Book',card.connects],['Where You Depart',card.departs],['Likely Objection',card.objection],['Key Details',card.keyDetails],['Suggested Reading',card.suggestedReading]].map(([label,text])=>text&&(
                                <div key={label} className="mb-3"><div className={`text-xs font-bold uppercase tracking-wide mb-1 ${label==='Likely Objection'?(dm?'text-amber-400':'text-amber-700'):(dm?'text-teal-400':'text-[#2E4057]')}`}>{label}</div><div className={`text-xs leading-relaxed ${dm?'text-gray-300':'text-gray-700'}`}>{text}</div></div>
                            ))}
                        </div>
                    </div>)}
                </div>
                <div className={`text-xs text-center py-2 flex-shrink-0 ${dm?'text-teal-500':'text-teal-600'}`}>Enter = Got It</div>
            </div>);

            return (<div className={`absolute inset-0 w-full h-full transition-transform duration-500 transform-style-preserve-3d card-flip-container ${isFlipped?'rotate-y-180':''}`}>{front}{back}</div>);
        };

        // ===== CONNECTION CARD =====
        const ConnectionCard = ({card, isFlipped, dm}) => {
            if (!card || !card.sources) return (<div className={`absolute inset-0 w-full h-full min-h-[400px] rounded-xl card-shadow border-2 flex flex-col items-center justify-center p-4 text-center ${dm?'bg-gray-800 border-gray-700':'bg-white border-gray-200'}`}><div className={`text-lg font-medium ${dm?'text-gray-300':'text-gray-600'}`}>All connections mastered!</div></div>);
            const front = (<div className={`absolute inset-0 w-full h-full rounded-xl card-shadow border-2 backface-hidden flex flex-col items-center justify-center p-6 ${dm?'bg-gray-800 border-purple-800':'bg-white border-purple-200'}`}>
                <span className={`absolute top-3 right-3 px-2 py-1 rounded-full text-xs font-medium ${dm?'bg-purple-900/50 text-purple-300':'bg-purple-100 text-purple-700'}`}>Connection</span>
                <div className={`text-xs uppercase tracking-wide mb-3 ${dm?'text-purple-400':'text-purple-600'}`}>Argument Thread</div>
                <div className={`font-bold text-center text-xl sm:text-2xl mb-4 ${dm?'text-gray-100':'text-gray-800'}`}>{card.thread}</div>
                <div className="flex flex-wrap gap-2 justify-center mb-4">{(card.sources||[]).map(s=><span key={s} className={`px-3 py-1 rounded-full text-sm font-medium ${dm?'bg-purple-900/40 text-purple-200':'bg-purple-100 text-purple-800'}`}>{s}</span>)}</div>
                <div className={`text-xs ${dm?'text-gray-500':'text-gray-400'}`}>How do these connect? Flip to check.</div>
            </div>);
            const back = (<div className={`absolute inset-0 w-full h-full rounded-xl card-shadow border-2 backface-hidden rotate-y-180 flex flex-col p-5 ${dm?'bg-purple-900/20 border-purple-800':'bg-purple-50 border-purple-200'}`}>
                <div className="card-back-content flex-1"><div className={`text-xs font-bold uppercase tracking-wide mb-2 ${dm?'text-purple-400':'text-purple-700'}`}>{card.thread}</div><div className={`text-sm leading-relaxed ${dm?'text-gray-200':'text-gray-700'}`}>{card.connection}</div></div>
                <div className={`text-xs text-center py-2 flex-shrink-0 ${dm?'text-purple-400':'text-purple-600'}`}>Enter = Got It</div>
            </div>);
            return (<div className={`absolute inset-0 w-full h-full transition-transform duration-500 transform-style-preserve-3d card-flip-container ${isFlipped?'rotate-y-180':''}`}>{front}{back}</div>);
        };

        // ===== MAIN APP =====
        const App = () => {
            const [idx, setIdx] = useState(0);
            const [flipped, setFlipped] = useState(false);
            const [mode, setMode] = useState(()=>{try{return JSON.parse(localStorage.getItem('cfMode'))||'study';}catch{return 'study';}});
            const [category, setCategory] = useState(()=>{try{return JSON.parse(localStorage.getItem('cfCat'))||'all';}catch{return 'all';}});
            const [tierFilter, setTierFilter] = useState(()=>{try{return JSON.parse(localStorage.getItem('cfTier'))||'all';}catch{return 'all';}});
            const [chFilter, setChFilter] = useState(()=>{try{return JSON.parse(localStorage.getItem('cfCh'))||'';}catch{return '';}});
            const [cards, setCards] = useState([]);
            const [anim, setAnim] = useState(false);
            const FLIP_DUR = 500;
            const [dm, setDm] = useState(()=>{try{const s=localStorage.getItem('cfDark');return s?JSON.parse(s):window.matchMedia('(prefers-color-scheme: dark)').matches;}catch{return false;}});
            const [showStats, setShowStats] = useState(false);
            const [undo, setUndo] = useState({show:false,card:null,timeout:null});
            const [streak, setStreak] = useState(()=>{
                try{const d=JSON.parse(localStorage.getItem('cfStreak'));if(d){const t=getTodayStr(),y=new Date(Date.now()-86400000).toISOString().split('T')[0];if(d.lastDate===t)return d;if(d.lastDate===y)return{...d,todayCards:0};return{streak:0,bestStreak:d.bestStreak||0,lastDate:null,todayCards:0};}return{streak:0,bestStreak:0,lastDate:null,todayCards:0};}catch{return{streak:0,bestStreak:0,lastDate:null,todayCards:0};}
            });
            const [mastered, setMastered] = useState(()=>{try{return new Set(JSON.parse(localStorage.getItem('cfMastered'))||[]);}catch{return new Set();}});
            const [connMastered, setConnMastered] = useState(()=>{try{return new Set(JSON.parse(localStorage.getItem('cfConnMast'))||[]);}catch{return new Set();}});
            const intRef = useRef({});
            const ptrRef = useRef(false);

            useEffect(()=>{try{localStorage.setItem('cfDark',JSON.stringify(dm));}catch{}},[dm]);
            useEffect(()=>{try{localStorage.setItem('cfMode',JSON.stringify(mode));}catch{}},[mode]);
            useEffect(()=>{try{localStorage.setItem('cfCat',JSON.stringify(category));}catch{}},[category]);
            useEffect(()=>{try{localStorage.setItem('cfTier',JSON.stringify(tierFilter));}catch{}},[tierFilter]);
            useEffect(()=>{try{localStorage.setItem('cfCh',JSON.stringify(chFilter));}catch{}},[chFilter]);
            useEffect(()=>{try{localStorage.setItem('cfStreak',JSON.stringify(streak));}catch{}},[streak]);
            useEffect(()=>{const t=setTimeout(()=>{try{localStorage.setItem('cfMastered',JSON.stringify([...mastered]));}catch{}},500);return()=>clearTimeout(t);},[mastered]);
            useEffect(()=>{const t=setTimeout(()=>{try{localStorage.setItem('cfConnMast',JSON.stringify([...connMastered]));}catch{}},500);return()=>clearTimeout(t);},[connMastered]);

            const catNames = Object.keys(DATA.categories);
            const catLabels = {'Philosophical Foundations':'Philosophy','Consciousness Science':'Consciousness','Quantum & Physics':'Quantum','Psychology & Toolkit':'Psychology','Neuroscience & Meditation':'Neuro','Ethics, Culture & Collective':'Ethics','Historical & Narrative':'History'};
            const allChapters = useMemo(()=>{const s=new Set();DATA.sources.forEach(src=>src.chapters.split(',').map(c=>c.trim()).forEach(c=>{if(c)s.add(c);}));return[...s].sort((a,b)=>parseInt(a)-parseInt(b));},[]);

            const filtered = useMemo(()=>{
                if(mode==='connections') return [];
                let srcs=DATA.sources;
                if(category!=='all'){const ranks=new Set(DATA.categories[category]||[]);srcs=srcs.filter(s=>ranks.has(s.rank));}
                if(tierFilter==='top') srcs=srcs.filter(s=>s.tier==='top');
                if(chFilter) srcs=srcs.filter(s=>s.chapters.split(',').map(c=>c.trim()).includes(chFilter));
                return srcs.sort((a,b)=>a.rank-b.rank);
            },[category,tierFilter,chFilter,mode]);

            useEffect(()=>{
                if(mode==='connections'){setCards(DATA.connectionCards.filter(c=>!connMastered.has(c.id)));}
                else{setCards(filtered.filter(s=>!mastered.has(s.rank)));}
                setIdx(0);setFlipped(false);
            },[filtered,mode]);

            const doShuffle=()=>{setCards(p=>shuffleArr([...p]));setIdx(0);setFlipped(false);};
            const nav=useCallback((dir)=>{if(anim||cards.length===0)return;const go=()=>setIdx(i=>dir==='next'?(i+1)%cards.length:(i-1+cards.length)%cards.length);if(flipped){setAnim(true);setFlipped(false);setTimeout(()=>{go();setAnim(false);},FLIP_DUR);}else go();},[flipped,anim,cards.length]);
            const flip=useCallback(()=>{if(cards.length>0)setFlipped(f=>!f);},[cards.length]);

            const handleUndo=useCallback(()=>{
                if(!undo.card)return;if(undo.timeout)clearTimeout(undo.timeout);setUndo({show:false,card:null,timeout:null});
                if(mode==='connections'){setConnMastered(p=>{const n=new Set(p);n.delete(undo.card.id);return n;});setCards(p=>[...p,undo.card]);}
                else{setMastered(p=>{const n=new Set(p);n.delete(undo.card.rank);return n;});setCards(p=>[...p,undo.card]);}
                setStreak(p=>({...p,todayCards:Math.max(0,p.todayCards-1)}));
            },[undo,mode]);

            const gotIt=useCallback(()=>{
                const cur=cards[idx];if(!cur||anim)return;
                const id=mode==='connections'?cur.id:cur.rank;const mSet=mode==='connections'?connMastered:mastered;const already=mSet.has(id);
                const doUpdate=()=>{
                    if(mode==='connections'){setConnMastered(p=>{const n=new Set(p);if(already)n.delete(id);else n.add(id);return n;});}
                    else{setMastered(p=>{const n=new Set(p);if(already)n.delete(id);else n.add(id);return n;});}
                    if(!already){
                        setStreak(p=>{const t=getTodayStr(),tc=p.todayCards+1;let ns=p.streak;if(p.lastDate!==t)ns=p.streak+1;return{streak:ns,bestStreak:Math.max(p.bestStreak,ns),lastDate:t,todayCards:tc};});
                        setCards(p=>{const nc=p.filter(c=>(mode==='connections'?c.id:c.rank)!==id);setIdx(pi=>Math.min(pi,nc.length>0?nc.length-1:0));return nc;});
                        if(undo.timeout)clearTimeout(undo.timeout);const to=setTimeout(()=>setUndo({show:false,card:null,timeout:null}),5000);setUndo({show:true,card:cur,timeout:to});
                    }
                };
                if(flipped&&!already){setAnim(true);setFlipped(false);setTimeout(()=>{doUpdate();setAnim(false);},FLIP_DUR);}else{setFlipped(false);doUpdate();}
            },[cards,idx,anim,mode,mastered,connMastered,flipped,undo]);

            const resetDeck=()=>{
                if(mode==='connections'){setConnMastered(new Set());setCards([...DATA.connectionCards]);}
                else{const ranks=filtered.map(s=>s.rank);setMastered(p=>{const n=new Set(p);ranks.forEach(r=>n.delete(r));return n;});setCards([...filtered]);}
                setIdx(0);setFlipped(false);
            };

            const pDown=(e)=>{if(cards.length===0||anim)return;ptrRef.current=true;intRef.current={startX:e.clientX,startY:e.clientY,isSwiping:false};try{e.target.setPointerCapture(e.pointerId);}catch{}};
            const pMove=(e)=>{if(!intRef.current.startX)return;if(Math.abs(e.clientX-intRef.current.startX)>10||Math.abs(e.clientY-intRef.current.startY)>10)intRef.current.isSwiping=true;};
            const pUp=(e)=>{if(!intRef.current.startX)return;const d=e.clientX-intRef.current.startX;if(intRef.current.isSwiping&&Math.abs(d)>50){d<0?nav('next'):nav('previous');}else{flip();}try{e.target.releasePointerCapture(e.pointerId);}catch{}intRef.current={};};
            const cardClick=()=>{if(ptrRef.current)return;if(cards.length===0||anim)return;flip();};

            useEffect(()=>{
                const h=(e)=>{if(['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName))return;switch(e.key){case'ArrowLeft':e.preventDefault();nav('previous');break;case'ArrowRight':e.preventDefault();nav('next');break;case' ':e.preventDefault();flip();break;case'Enter':e.preventDefault();gotIt();break;case'z':if((e.ctrlKey||e.metaKey)&&undo.show){e.preventDefault();handleUndo();}break;case'd':if(e.ctrlKey||e.metaKey){e.preventDefault();setDm(d=>!d);}break;}};
                window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
            },[nav,flip,gotIt,handleUndo,undo.show]);

            const cur=cards[idx];const total=mode==='connections'?DATA.connectionCards:filtered;
            const masteredInView=useMemo(()=>{if(mode==='connections'){let c=0;for(const id of connMastered)if(DATA.connectionCards.some(cc=>cc.id===id))c++;return c;}let c=0;for(const r of mastered)if(total.some(s=>s.rank===r))c++;return c;},[total,mastered,connMastered,mode]);
            const progress=total.length>0?(masteredInView/total.length)*100:0;
            const stats={todayCards:streak.todayCards,totalMastered:mastered.size,connMastered:connMastered.size,streak:streak.streak,bestStreak:streak.bestStreak};

            return (
                <div className={`min-h-screen p-4 flex flex-col dark-transition ${dm?'bg-gray-900':'bg-gradient-to-br from-slate-50 to-teal-50'}`}>
                    <div className="max-w-md mx-auto w-full flex flex-col flex-grow">
                        <header className="mb-3">
                            <div className="flex items-center justify-between mb-1"><div className="flex items-center gap-2"><BookIcon dm={dm}/><h1 className={`text-xl sm:text-2xl font-bold ${dm?'text-gray-100':'text-gray-800'}`}>Citation Fluency</h1></div><button onClick={()=>setDm(d=>!d)} className={`p-2 rounded-lg transition-colors btn-bounce ${dm?'bg-gray-800 text-yellow-400 hover:bg-gray-700':'bg-white text-gray-700 hover:bg-gray-100 shadow-sm border'}`}>{dm?<SunIcon/>:<MoonIcon/>}</button></div>
                            <p className={`text-xs ${dm?'text-gray-500':'text-gray-400'}`}>The Conscious Architect — {DATA.metadata.totalSources} sources · {DATA.connectionCards.length} connections</p>
                        </header>
                        <div className="flex items-center justify-between mb-3"><div className="flex items-center gap-3"><CircularProgress progress={progress} dm={dm}/><div><div className={`text-sm font-medium ${dm?'text-gray-200':'text-gray-700'}`}>{masteredInView}/{total.length} mastered</div><div className={`text-xs ${dm?'text-gray-400':'text-gray-500'}`}>{streak.todayCards} today</div></div></div><div className="flex items-center gap-2">{streak.streak>0&&<div className={`flex items-center gap-1 px-2 py-1 rounded-full ${dm?'bg-orange-900/30':'bg-orange-100'}`}><FireIcon/><span className={`text-sm font-medium ${dm?'text-orange-300':'text-orange-700'}`}>{streak.streak}</span></div>}<button onClick={()=>setShowStats(true)} className={`p-2 rounded-lg transition-colors btn-bounce ${dm?'bg-gray-800 hover:bg-gray-700':'bg-white hover:bg-gray-50 shadow-sm border'}`}><ChartIcon dm={dm}/></button></div></div>
                        <div className="flex gap-1 mb-3">{[{k:'study',l:'Study'},{k:'connections',l:'Connections'},{k:'quiz',l:'Quiz'}].map(m=><button key={m.k} onClick={()=>setMode(m.k)} className={`flex-1 py-1.5 rounded-lg text-xs font-medium transition-colors btn-bounce ${mode===m.k?(m.k==='connections'?(dm?'bg-purple-800 text-purple-200':'bg-purple-600 text-white'):(dm?'bg-teal-800 text-teal-200':'bg-[#2E4057] text-white')):(dm?'bg-gray-800 text-gray-400 hover:bg-gray-700':'bg-white text-gray-600 hover:bg-gray-100 border')}`}>{m.l}</button>)}</div>
                        {mode!=='connections'&&(<><div className="category-pills flex gap-2 mb-3 pb-1"><button onClick={()=>setCategory('all')} className={`whitespace-nowrap px-3 py-1 rounded-full text-xs font-medium transition-colors btn-bounce ${category==='all'?(dm?'bg-teal-800 text-teal-200':'bg-[#2E4057] text-white'):(dm?'bg-gray-800 text-gray-400 hover:bg-gray-700':'bg-white text-gray-600 hover:bg-gray-100 border')}`}>All</button>{catNames.map(c=><button key={c} onClick={()=>setCategory(c)} className={`whitespace-nowrap px-3 py-1 rounded-full text-xs font-medium transition-colors btn-bounce ${category===c?(dm?'bg-teal-800 text-teal-200':'bg-[#2E4057] text-white'):(dm?'bg-gray-800 text-gray-400 hover:bg-gray-700':'bg-white text-gray-600 hover:bg-gray-100 border')}`}>{catLabels[c]||c}</button>)}</div>
                        <div className="flex flex-wrap gap-2 mb-3 items-center"><button onClick={()=>setTierFilter(f=>f==='all'?'top':'all')} className={`px-3 py-1.5 rounded-lg text-xs font-medium transition-colors btn-bounce border ${tierFilter==='top'?(dm?'bg-amber-900/50 border-amber-700 text-amber-300':'bg-amber-100 border-amber-300 text-amber-800'):(dm?'bg-gray-800 border-gray-700 text-gray-400':'bg-white border-gray-200 text-gray-600')}`}>{tierFilter==='top'?'Top 36 Only':'All Tiers'}</button><select value={chFilter} onChange={e=>setChFilter(e.target.value)} className={`px-2 py-1.5 rounded-lg text-xs font-medium border ${dm?'bg-gray-800 border-gray-700 text-gray-300':'bg-white border-gray-200 text-gray-600'}`}><option value="">All Chapters</option>{allChapters.map(ch=><option key={ch} value={ch}>Ch. {ch}</option>)}</select><button onClick={doShuffle} disabled={cards.length<2} className={`p-1.5 rounded-lg border transition-colors disabled:opacity-50 btn-bounce ${dm?'bg-gray-800 border-gray-700 hover:bg-gray-700':'bg-white border-gray-200 hover:bg-gray-50'}`}><ShuffleIcon dm={dm}/></button><div className={`ml-auto text-xs font-medium ${dm?'text-gray-400':'text-gray-500'}`}>{cards.length>0?`${idx+1} / ${cards.length}`:'Empty'}</div></div></>)}
                        {mode==='connections'&&(<div className="flex justify-between items-center mb-3"><button onClick={doShuffle} disabled={cards.length<2} className={`p-1.5 rounded-lg border transition-colors disabled:opacity-50 btn-bounce ${dm?'bg-gray-800 border-gray-700 hover:bg-gray-700':'bg-white border-gray-200 hover:bg-gray-50'}`}><ShuffleIcon dm={dm}/></button><div className={`text-xs font-medium ${dm?'text-gray-400':'text-gray-500'}`}>{cards.length>0?`${idx+1} / ${cards.length}`:'Empty'}</div></div>)}
                        <div className="relative w-full min-h-[400px] cursor-pointer perspective-1000 touch-action-pan-y" onPointerDown={pDown} onPointerMove={pMove} onPointerUp={pUp} onClick={cardClick}>{mode==='connections'?<ConnectionCard card={cur && cur.sources ? cur : null} isFlipped={flipped} dm={dm}/>:<SourceCard card={cur && cur.rank ? cur : null} isFlipped={flipped} mode={mode} dm={dm}/>}</div>
                        <div className="flex justify-between items-center mb-4 mt-4"><button onClick={()=>nav('previous')} disabled={cards.length<2||anim} className={`flex items-center gap-2 px-4 py-2 rounded-lg shadow-sm border disabled:opacity-50 disabled:cursor-not-allowed transition-colors text-sm btn-bounce ${dm?'bg-gray-800 border-gray-700 text-gray-200 hover:bg-gray-700':'bg-white hover:bg-gray-50'}`}><ChevLeft/>Prev</button><div className="flex items-center gap-2"><button onClick={resetDeck} disabled={total.length===0} className={`p-2 rounded-lg shadow-sm border transition-colors disabled:opacity-50 btn-bounce ${dm?'bg-gray-800 border-gray-700 hover:bg-gray-700':'bg-white hover:bg-gray-50'}`} title="Reset"><RefreshIcon dm={dm}/></button><button onClick={gotIt} disabled={!cur||anim} className={`p-2 rounded-lg shadow-sm border transition-colors disabled:opacity-50 btn-bounce ${(cur&&(mode==='connections'?connMastered.has(cur.id):mastered.has(cur.rank)))?'bg-green-500 text-white border-green-600 hover:bg-green-600':dm?'bg-gray-800 border-gray-700 text-gray-300 hover:bg-gray-700':'bg-white text-gray-600 hover:bg-gray-50'}`} title="Got It (Enter)"><CheckIcon/></button></div><button onClick={()=>nav('next')} disabled={cards.length<2||anim} className="flex items-center gap-2 px-4 py-2 bg-[#2E4057] text-white rounded-lg shadow-sm disabled:opacity-50 hover:bg-[#3a5270] transition-colors text-sm btn-bounce">Next<ChevRight/></button></div>
                        <div className={`text-center text-xs mb-4 ${dm?'text-gray-500':'text-gray-400'}`}><span className={`inline-flex items-center gap-1 px-2 py-1 rounded ${dm?'bg-gray-800':'bg-gray-100'}`}>&larr; &rarr; Navigate &middot; Space Flip &middot; Enter Got It</span></div>
                    </div>
                    <UndoToast show={undo.show} onUndo={handleUndo} dm={dm}/>
                    <StatsModal show={showStats} onClose={()=>setShowStats(false)} stats={stats} dm={dm}/>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App/></ErrorBoundary>);
    </script>
</body>
</html>
